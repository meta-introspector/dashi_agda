name: Agda CI

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Agda + stdlib
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: "2.6.4.3"
          agda-stdlib-version: "2.1"

      - name: Show versions
        run: |
          agda --version

      - name: Typecheck (root module)
        run: |
          set -euxo pipefail
          agda -i . DASHI/Everything.agda | tee agda-typecheck.log

      - name: Upload typecheck log
        uses: actions/upload-artifact@v4
        with:
          name: agda-typecheck-log
          path: agda-typecheck.log
