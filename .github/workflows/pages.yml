name: Build & Deploy Docs

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Install Agda + stdlib
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: "2.6.4.3"
          agda-stdlib-version: "2.1"

      - name: Install LaTeX toolchain
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-base texlive-latex-recommended texlive-fonts-recommended

      - name: Build HTML (clickable rendered code)
        run: |
          set -euxo pipefail
          mkdir -p site
          agda -i . \
            --html --html-dir=site \
            DASHI/Everything.agda

      - name: Build PDF (Theory.lagda.tex)
        run: |
          set -euxo pipefail
          mkdir -p build/latex
          agda -i . \
            --latex --latex-dir=build/latex \
            docs/Theory.lagda.tex

          latexmk -pdf -interaction=nonstopmode -halt-on-error -outdir=build/latex build/latex/Theory.tex

          cp build/latex/Theory.pdf site/Theory.pdf

      - name: Add a tiny landing page
        run: |
          set -euxo pipefail
          cat > site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8" />
          <title>DASHI Proof Artifacts</title>
          <h1>DASHI Proof Artifacts</h1>
          <ul>
            <li><a href="./DASHI.Everything.html">Clickable rendered code (HTML)</a></li>
            <li><a href="./Theory.pdf">Theory PDF</a></li>
          </ul>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload PDF as a normal artifact too
        uses: actions/upload-artifact@v4
        with:
          name: theory-pdf
          path: site/Theory.pdf

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
