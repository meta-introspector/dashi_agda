malCrediblePhysicsClosureShiftInstance</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.3775" x="2474.5747" y="110.1697">[current milestone]</text></g><!--entity GRBridge--><g class="entity" data-qualified-name="GRBridge" data-source-line="37" id="ent0012"><rect fill="#FEE2E2" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="226.9332" x="2424.29" y="431.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154.9374" x="2460.2879" y="456.0339">Known-limits GR bridge</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.9332" x="2434.29" y="475.1018">KnownLimitsGRBridgeTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.6694" x="2454.4219" y="494.1697">[bridge, not full recovery]</text></g><!--entity QFTBridge--><g class="entity" data-qualified-name="QFTBridge" data-source-line="38" id="ent0013"><rect fill="#FEE2E2" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="234.0172" x="2420.75" y="623.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.0214" x="2456.7479" y="648.0339">Known-limits QFT bridge</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.0172" x="2430.75" y="667.1018">KnownLimitsQFTBridgeTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.6694" x="2454.4239" y="686.1697">[bridge, not full recovery]</text></g><g class="entity" data-qualified-name="GMN26" data-source-line="54" id="ent0027"><path d="M308.07,270.1079 L308.07,315.226 A9,9 0 0 0 317.07,324.226 L477.65,324.226 L481.65,359.1579 L485.65,324.226 L646.2142,324.226 A9,9 0 0 0 655.2142,315.226 L655.2142,271.1079 L645.2142,261.1079 L317.07,261.1079 A9,9 0 0 0 