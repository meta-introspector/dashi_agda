.6397">[proved]</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.0973" x="387.098" y="441.7076">Active seam/bottleneck layer</text></g><!--entity SigBridge--><g class="entity" data-qualified-name="SigBridge" data-source-line="29" id="ent0004"><rect fill="#DCFCE7" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="345.4708" x="812.22" y="312.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.8353" x="899.0377" y="337.0339">Lorentz / signature bridge</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="325.4708" x="822.22" y="356.1018">ContractionQuadraticToSignatureBridgeTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.0996" x="927.9056" y="375.1697">[proved + bridge]</text></g><!--entity CliffBridge--><g class="entity" data-qualified-name="CliffBridge" data-source-line="30" id="ent0005"><rect fill="#DCFCE7" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="253.0711" x="858.42" y="424.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="95.3256" x="937.2927" y="449.0339">Clifford bridge</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="233.0711" x="868.42" y="468.1018">QuadraticToCliffordBridgeTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.0996" x="927.9058" y="487.1697">[proved + bridge]</text></g><!--entity CliffBundle--><g class="entity" data-qualified-name="CliffBundle" data-source-line="31" id="ent0006"><rect fill="#FEF3C7" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="329.4408" x="1365.69" y="369.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="260.987" x="1399.9169" y="394.0339">Canonical contraction -&gt; Clifford bundle</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="309.4408" x="1375.69" y="413.1018">CanonicalContractionToCliffordBridgeTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136.6115" x="1462.1047" y="432.1697">[canonical assembly]</text></g><!--entity FullClosure--><g class="entity" data-qualified-name="FullClosure" data-source-line="32" id="ent0007"><rect fill="#FEF3C7" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="253.6731" x="1875.13" y="369.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.4055" x="1935.2638" y="394.0339">Full closure instance</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="177.3933" x="1913.2699" y="413.1018">PhysicsClosureFullInstance</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="233.6731" x="1885.13" y="432.1697">[current canonical closure package]</text></g><!--entity UnifiedOwner--><g class="entity" data-qualified-name="UnifiedOwner" data-source-line="33" id="ent0008"><rect fill="#FEF3C7" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="175.0074" x="2450.26" y="239.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.3554" x="2461.086" y="264.0339">Unified theorem owner</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="155.0074" x="2460.26" y="283.1018">UnifiedPhysicsTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136.4575" x="2469.5349" y="302.1697">[strong claim owner]</text></g><!--entity AdapterOwner--><g class="entity" data-qualified-name="Adapt