 L1246.85,1221.5479 L1242.85,1256.6579 L1117.11,1256.6579 A9,9 0 0 0 1108.11,1265.6579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1375.5872,1256.6579 L1375.5872,1262.1579 A4.5,4.5 0 0 0 1380.0872,1266.6579 L1385.5872,1266.6579 L1375.5872,1256.6579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.8832" x="1157.907" y="1275.5549">Strongest current evidence:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.3352" x="1133.181" y="1293.2609">formal geometric/closure structure.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.4772" x="1114.11" y="1310.967">Closest to spacetime-formalism language,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.1192" x="1130.789" y="1328.673">not yet to full atom-by-atom physics.</text></g><g class="entity" data-qualified-name="GMN63" data-source-line="110" id="ent0064"><path d="M3506.36,994.5079 L3506.36,1039.626 A9,9 0 0 0 3515.36,1048.626 L3990.0004,1048.626 A9,9 0 0 0 3999.0004,1039.626 L3999.0004,995.5079 L3989.0004,985.5079 L3515.36,985.5079 A9,9 0 0 0 3506.36,994.5079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M3989.0004,985.5079 L3989.0004,991.0079 A4.5,4.5 0 0 0 3993.5004,995.5079 L3999.0004,995.5079 L3989.0004,985.5079" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.0493" x="3600.1556" y="1004.4049">This is where the public story needed correction:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.5562" x="3619.4021" y="1022.1109">not solved, no longer "missing from zero",</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthA