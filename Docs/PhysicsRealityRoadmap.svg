ke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="334.1002" x="1075.3045" y="311.5549">These adjacent lanes matter for roadmap truthfulness.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="341.1462" x="1071.7815" y="329.2609">They widen the program beyond the core physics spine,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="380.0293" x="1052.34" y="346.967">but they do not upgrade the current repo to solved unification</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="328.7442" x="1077.9825" y="364.673">or to local theorem closure on brain/crossover claims.</text></g><g class="entity" data-qualified-name="GMN72" data-source-line="130" id="ent0073"><path d="M3618.73,763.3579 L3618.73,790.7699 A9,9 0 0 0 3627.73,799.7699 L3748.68,799.7699 L3752.68,853.7279 L3756.68,799.7699 L3877.6262,799.7699 A9,9 0 0 0 3886.6262,790.7699 L3886.6262,764.3579 L3876.6262,754.3579 L3627.73,754.3579 A9,9 0 0 0 3618.73,763.3579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M3876.6262,754.3579 L3876.6262,759.8579 A4.5,4.5 0 0 0 3881.1262,764.3579 L3886.6262,764.3579 L3876.6262,754.3579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.2791" x="3673.5385" y="773.2549">This is the bar for saying</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246.8962" x="3624.73" y="790.9609">"we solved unification" without hedging.</text></g><!--link RealityLight to FormalQM--><g class="link" data-entity-1="ent0003" data-entity-2="ent0008" data-link-type="dependency" data-source-line="68" id="lnk30"><path d="M204.24,732.5679 C264.89,738.9379 349.23,748.0779 423.22,757.0679 C448.35,760.1179 469.5528,762.8534