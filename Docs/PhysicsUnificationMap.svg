ext fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.6175" x="1051.4157" y="706.9097">[packaging + bridge]</text></g><!--entity Milestone--><g class="entity" data-qualified-name="Packaging layers.Milestone" data-source-line="39" id="ent0009"><rect fill="#DBEAFE" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="312.0669" x="670.19" y="487.6079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="292.0669" x="680.19" y="512.5739">MinimalCrediblePhysicsClosureShiftInstance</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.8253" x="738.3108" y="531.6418">current milestone package</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="77.2097" x="787.6186" y="550.7097">[packaging]</text></g><!--entity AtomCarrier--><g class="entity" data-qualified-name="Packaging layers.AtomCarrier" data-source-line="40" id="ent0010"><rect fill="#DBEAFE" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="388.8986" x="246.77" y="487.6079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="231.9651" x="325.2368" y="512.5739">AtomicChemistryRecoveryTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="368.8986" x="256.77" y="531.6418">atom/chemistry interpretation carrier with explicit gates</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.6175" x="373.4106" y="550.7097">[packaging + bridge]</text></g><!--entity EmpiricalLane--><g class="entity" data-qualified-name="Empirical lane.EmpiricalLane" data-source-line="44" id="ent0012"><rect fill="#FEE2E2" height="58.1358" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="474.4943" x="1067.97" y="305.4079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="454.4943" x="1077.97" y="330.3739">Photonuclear empirical registry + validation + HEPData normalization</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="69.9997" x="1270.2173" y="349.4418">[empirical]</text></g><!--entity OpenProgram--><g class="entity" data-qualified-name="Open program.OpenProgram" data-source-line="48" id="ent0014"><rect fill="#FCE7F3" height="115.3396" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="334.4667" x="428.99" y="826.0179"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="271.1369" x="460.6549" y="850.9839">Natural dynamics law in the strong sense</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.069" x="470.1889" y="870.0518">broad realization-independent closure</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="176.3293" x="508.0587" y="889.1197">full gauge/matter recovery</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="314.4667" x="438.99" y="908.1876">continuum-limit theorem with physical recovery</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="129.0515" x="531.6976" y="927.2555">[speculative / open]</text></g><g class="entity" data-qualified-name="GMN25" data-source-line="63" id="ent0026"><path d="M920.49,119.4979 L920.49,129.1979 L886.16,133.1979 L920.49,137.1979 L920.49,146.9099 A9,9 0 0 0 929.49,155.9099 L1180.9462,155.9099 A9,9 0 0 0 1189.9462,146.9099 L1189.9462,120.4979 L1179.9462,110.4979 L929.49,110.4979 A9,9 0 0 0 920.49,119.4979" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1179.9462,110.4979 L1179.9462,115.9979 A4.5,4.5 0 0 0 1184.4462,120.4979 L1189.9462,120.4979 L1179.9462,110.4979" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.2862" x="966.075" y="129.3949">This is the part to trust first.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.4562" x="926.49" y="147.1009">It carries the strongest current evidence.</text></g><g class="entity" data-qualified-name="GMN28" data-source-line="68" id="ent0029"><path d="M1577.06,303.0579 L1577.06,365.882 A9,9 0 0 0 1586.06,374.882 L1942.3872,374.882 A9,9 0 0 0 1951.3872,365.882 L1951.3872,304.0579 L1941.3872,294.0579 L1586.06,294.0579 A9,9 0 0 0 1577.06,303.0579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1941.3872,294.0579 L1941.3872,299.5579 A4.5,4.5 0 0 0 1945.8872,304.0579 L1951.3872,304.0579 L1941.3872,294.0579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.7291" x="1693.8591" y="312.9549">Important correction:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.3272" x="1583.06" y="330.6609">some recovery structure is already theorem-bearing here.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.2003" x="1627.1235" y="348.367">The open gap is stronger physical recovery,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.7112" x="1644.368" y="366.073">not total absence of bridge theorems.</text></g><g class="entity" data-qualified-name="GMN31" data-source-line="75" id="ent0032"><path d="M1986.1,320.7679 L1986.1,348.1799 A9,9 0 0 0 1995.1,357.1799 L2305.3422,357.1799 A9,9 0 0 0 2314.3422,348.1799 L2314.3422,321.7679 L2304.3422,311.7679 L1995.1,311.7679 A9,9 0 0 0 1986.1,320.7679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2304.3422,311.7679 