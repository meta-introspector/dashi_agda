 data-source-line="43" id="ent0011"><rect fill="#FFFFFF" height="326.67" rx="9" ry="9" style="stroke:#334155;stroke-width:1;" width="673" x="251" y="629.8179"/><text fill="#0F172A" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="215.0112" x="479.9944" y="646.7839">Adjacent archive-derived lanes</text></g><!--cluster Empirical lane--><g class="cluster" data-qualified-name="Empirical lane" data-source-line="49" id="ent0015"><rect fill="#FFFFFF" height="112.13" rx="9" ry="9" style="stroke:#334155;stroke-width:1;" width="506" x="1286" y="267.4079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="98.4056" x="1489.7972" y="284.3739">Empirical lane</text></g><!--cluster Open program--><g class="cluster" data-qualified-name="Open program" data-source-line="53" id="ent0017"><rect fill="#FFFFFF" height="188.41" rx="9" ry="9" style="stroke:#334155;stroke-width:1;" width="582" x="867" y="1007.4879"/><text fill="#0F172A" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="102.0176" x="1106.9912" y="1024.4539">Open program</text></g><!--entity FormalCore--><g class="entity" data-qualified-name="Proved formal core.FormalCore" data-source-line="29" id="ent0003"><rect fill="#DCFCE7" height="96.2717" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="301.4409" x="1471.28" y="85.0679"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="281.4409" x="1481.28" y="110.0339">Canonical theorem spine + theorem owner</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="281.3569" x="1481.322" y="129.1018">quadratic -&gt; signature -&gt; Clifford -&gt; closure</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="155.0074" x="1544.4968" y="148.1697">UnifiedPhysicsTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="55.6918" x="1594.1545" y="167.2376">[proved]</text></g><!--entity BridgeLayers--><g class="entity" data-qualified-name="Bridge layers.BridgeLayers" data-source-line="33" id="ent0005"><rect fill="#FEF3C7" height="96.2717" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="341.9288" x="904.04" y="286.3379"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="321.9288" x="914.04" y="311.3039">Signature / Clifford / Dirac / known-limits bridges</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="249.591" x="950.2089" y="330.3718">plus narrow realization-independence</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="255.205" x="947.4019" y="349.4397">and explicit abstract/canonical adapter</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="52.3318" x="1048.8385" y="368.5076">[bridge]</text></g><!--entity DashiDynamics--><g class="entity" data-qualified-name="Packaging layers.DashiDynamics" data-source-line="37" id="ent0007"><rect fill="#DBEAFE" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="276.759" x="1387.62" y="487.6079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="101.0376" x="1475.4807" y="512.5739">DashiDynamics</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.759" x="1397.62" y="531.6418">shared state/path/observable interface</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="77.2097" x="1487.3947" y="550.7097">[packaging]</text></g><!--entity DynamicsConsumers--><g class="entity" data-qualified-name="Packaging layers.DynamicsConsumers" data-source-line="38" id="ent0008"><rect fill="#DBEAFE" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="327.0888" x="1356.46" y="677.3479"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="307.0888" x="1366.46" y="702.3139">Hamilton-Jacobi / gradient-flow / Schrodinger /</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="191.6872" x="1424.1608" y="721.3818">finite wave-phase consumers</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.6175" x="1452.1957" y="740.4497">[packaging + bridge]</text></g><!--entity Milestone--><g class="entity" data-qualified-name="Packaging layers.Milestone" data-source-line="39" id="ent0009"><rect fill="#DBEAFE" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="312.0669" x="1698.97" y="487.6079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="292.0669" x="1708.97" y="512.5739">MinimalCrediblePhysicsClosureShiftInstance</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.8253" x="1767.0908" y="531.6418">current milestone package</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="77.2097" x="1816.3986" y="550.7097">[packaging]</text></g><!--entity AtomCarrier--><g class="entity" data-qualified-name="Packaging layers.AtomCarrier" data-source-line="40" id="ent0010"><rect fill="#DBEAFE" height="77.2038" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="388.8986" x="963.55" y="487.6079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="231.9651" x="1042.0168" y="512.5739">AtomicChemistryRecoveryTheorem</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="368.8986" x="973.55" y="531.6418">atom/chemistry interpretation carrier with explicit gates</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.6175" x="1090.1906" y="550.7097">[packaging + bridge]</text></g><!--entity DNALane--><g class="entity" data-qualified-name="Adjacent archive-derived lanes.DNALane" data-source-line="44" id="ent0012"><rect fill="#DBEAFE" height="96.2717" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="324.4988" x="266.75" y="667.8179"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="304.4988" x="276.75" y="692.7839">DNA-first supervoxel / chemistry quotient lane</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="281.8049" x="288.097" y="711.8518">carrier + quotient + UV bridge + checksum/</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="270.5909" x="293.7039" y="730.9197">streaming/eigen/channel owner surfaces</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.8632" x="322.0678" y="749.9876">[packaging + local formalization]</text></g><!--entity BrainLane--><g class="entity" data-qualified-name="Adjacent archive-derived lanes.BrainLane" data-source-line="45" id="ent0013"><rect fill="#FFF7ED" height="96.2717" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="281.841" x="626.08" y="667.8179"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="226.5471" x="653.7269" y="692.7839">Brain-side structure / analysis lane</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="261.841" x="636.08" y="711.8518">mostly sibling-repo and archive-backed,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="254.967" x="639.517" y="730.9197">not yet a local Agda theorem lane here</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="229.0671" x="652.4669" y="749.9876">[archive-guided adjacent program]</text></g><!--entity CrossoverLane--><g class="entity" data-qualified-name="Adjacent archive-derived lanes.CrossoverLane" data-source-line="46" id="ent0014"><rect fill="#FFF7ED" height="96.2717" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="348.7607" x="391.62" y="844.2179"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.027" x="439.9869" y="869.1839">Brain-DNA / codec / channel crossover</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="328.7607" x="401.62" y="888.2518">storage semantics, synthesis-sequencing channel,</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="299.1649" x="416.4179" y="907.3197">and wider bridge ideas still only partial locally</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="229.0671" x="451.4668" y="926.3876">[archive-guided adjacent program]</text></g><!--entity EmpiricalLane--><g class="entity" data-qualified-name="Empirical lane.EmpiricalLane" data-source-line="50" id="ent0016"><rect fill="#FEE2E2" height="58.1358" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="474.4943" x="1301.75" y="305.4079"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="454.4943" x="1311.75" y="330.3739">Photonuclear empirical registry + validation + HEPData normalization</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="69.9997" x="1503.9973" y="349.4418">[empirical]</text></g><!--entity OpenProgram--><g class="entity" data-qualified-name="Open program.OpenProgram" data-source-line="54" id="ent0018"><rect fill="#FCE7F3" height="134.4075" rx="9" ry="9" style="stroke:#334155;stroke-width:0.5;" width="549.352" x="883.32" y="1045.4879"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="197.2032" x="1059.3944" y="1070.4539">Open program, now lane-split</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="399.6144" x="958.1888" y="1089.5218">Natural/conserved: advanced but blocked on next ingredient</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="418.1644" x="948.9138" y="1108.5897">Continuum/adapter: advanced but blocked on richer MDL seam</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="409.6664" x="953.1628" y="1127.6576">Gauge/GR-QFT: advanced, then blocked on upstream recovery</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="529.352" x="893.32" y="1146.7255">Atomic/nuclear: advanced, then blocked on interpretation + owner-cycle cleanup</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="129.0515" x="1093.4702" y="1165.7934">[speculative / open]</text></g><g class="entity" data-qualified-name="GMN34" data-source-line="74" id="ent0035"><path d="M1807.27,119.4979 L1807.27,129.1979 L1772.94,133.1979 L1807.27,137.1979 L1807.27,146.9099 A9,9 0 0 0 1816.27,155.9099 L2067.7262,155.9099 A9,9 0 0 0 2076.7262,146.9099 L2076.7262,120.4979 L2066.7262,110.4979 L1816.27,110.4979 A9,9 0 0 0 1807.27,119.4979" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2066.7262,110.4979 L2066.7262,115.9979 A4.5,4.5 0 0 0 2071.2262,120.4979 L2076.7262,120.4979 L2066.7262,110.4979" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.2862" x="1852.855" y="129.3949">This is the part to trust first.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.4562" x="1813.27" y="147.1009">It carries the strongest current evidence.</text></g><g class="entity" data-qualified-name="GMN37" data-source-line="79" id="ent0038"><path d="M2087.84,303.0579 L2087.84,365.882 A9,9 0 0 0 2096.84,374.882 L2453.1672,374.882 A9,9 0 0 0 2462.1672,365.882 L2462.1672,304.0579 L2452.1672,294.0579 L2096.84,294.0579 A9,9 0 0 0 2087.84,303.0579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2452.1672,294.0579 L2452.1672,299.5579 A4.5,4.5 0 0 0 2456.6672,304.0579 L2462.1672,304.0579 L2452.1672,294.0579" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.7291" x="2204.6391" y="312.9549">Important correction:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.3272" x="2093.84" y="330.6609">some recovery structure is already theorem-bearing here.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.2003" x="2137.9035" y="348.367">The open gap is stronger physical recovery,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.7112" x="2155.148" y="366.073">not total absence of bridge theorems.</text></g><g class="entity" data-qualified-name="GMN40" data-source-line="86" id="ent0041"><path d="M2496.88,320.7679 L2496.88,348.1799 A9,9 0 0 0 2505.88,357.1799 L2816.1222,357.1799 A9,9 0 0 0 2825.1222,348.1799 L2825.1222,321.7679 L2815.1222,311.7679 L2505.88,311.7679 A9,9 0 0 0 2496.88,320.7679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2815.1222,311.7679 L2815.1222,317.2679 A4.5,4.5 0 0 0 2819.6222,321.7679 L2825.1222,321.7679 L2815.1222,311.7679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.2422" x="2502.88" y="330.6649">Useful for calibration and interpretation contracts.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.0202" x="2529.491" y="348.3709">Not evidence of theorem closure by itself.</text></g><g class="entity" data-qualified-name="GMN43" data-source-line="91" id="ent0044"><path d="M2043.21,675.6879 L2043.21,756.218 A9,9 0 0 0 2052.21,765.218 L2443.7803,765.218 A9,9 0 0 0 2452.7803,756.218 L2452.7803,676.6879 L2442.7803,666.6879 L2052.21,666.6879 A9,9 0 0 0 2043.21,675.6879" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2442.7803,666.6879 L2442.7803,672.1879 A4.5,4.5 0 0 0 2447.2803,676.6879 L2452.7803,676.6879 L2442.7803,666.6879" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.0301" x="2176.4801" y="685.5849">Important scope split:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.9452" x="2095.5225" y="703.2909">the DNA lane is now genuinely localized in Agda,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6043" x="2084.193" y="720.997">but it is not itself a physics-unification theorem lane.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="387.1402" x="2049.925" y="738.703">The brain and crossover material remain mostly archive-guided</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="388.5703" x="2049.21" y="756.409">or sibling-repo adjacent rather than local theorem closure here.</text></g><g class="entity" data-qualified-name="GMN46" data-source-line="99" id="ent0047"><path d="M965.34,1251.8979 L965.34,1314.722 A9,9 0 0 0 974.34,1323.722 L1341.6652,1323.722 A9,9 0 0 0 1350.6652,1314.722 L1350.6652,1252.8979 L1340.6652,1242.8979 L1162,1242.8979 L1158,1180.3279 L1154,1242.8979 L974.34,1242.8979 A9,9 0 0 0 965.34,1251.8979" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1340.6652,1242.8979 L1340.6652,1248.3979 A4.5,4.5 0 0 0 1345.1652,1252.8979 L1350.6652,1252.8979 L1340.6652,1242.8979" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.2412" x="1045.882" y="1261.7949">This is the live non-claim boundary.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.8272" x="1038.589" y="1279.5009">The repo is not entitled to cross it yet.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.3252" x="971.34" y="1297.207">Several lanes are now advanced or explicitly blocker-bound,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.7071" x="1079.149" y="1314.913">not "missing from zero."</text></g><!--link FormalCore to BridgeLayers--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="57" id="lnk19"><path d="M1471.1,178.0079 C1412.78,195.9379 1345.81,217.7679 1286,240.3379 C1249.85,253.9779 1216.4477,268.1196 1182.0377,283.4996" fill="none" id="FormalCore-to-BridgeLayers" style="stroke:#181818;stroke-width:2;"/><polygon fill="#181818" points="1176.56,285.9479,1186.4088,285.9272,1181.1248,283.9076,1183.1444,278.6236,1176.56,285.9479" style="stroke:#181818;stroke-width:2;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="101.4261" x="1359.68" y="228.2349">formal transport</text></g><!--link FormalCore to Milestone--><g class="link" data-entity-1="ent0003" data-entity-2="ent0009" data-link-type="dependency" data-source-line="58" id="lnk20"><path d="M1727.14,181.7879 C1751.61,197.3079 1775.33,216.7579 1792,240.3379 C1845.49,316.0379 1854.6074,423